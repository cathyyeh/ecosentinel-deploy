name: Deploy EcoSentinel to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # ----------------------------------------------------------------
      # 把 Supabase 設定從 GitHub Secrets 注入到 public/js/config.js
      # ----------------------------------------------------------------
      # 為什麼這樣做:
      #  - Supabase URL 與 anon key 在前端暴露是 Supabase 預期的設計
      #    (真正的安全靠資料庫的 Row Level Security 規則)
      #  - 但我們仍把它放在 GitHub Secrets,避免把專案綁死在 source code 裡
      #  - 這樣切換環境、轉移 Supabase 專案都不必改動 repo
      # ----------------------------------------------------------------
      - name: Inject Supabase config
        run: |
          cat > public/js/config.js <<EOF
          // Auto-generated by GitHub Actions during deployment.
          // Edit secrets in: Repo → Settings → Secrets and variables → Actions
          window.ECOSENTINEL_CONFIG = {
            SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
            SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}',
            USE_MOCK_DATA: false,
          };
          if (!window.ECOSENTINEL_CONFIG.SUPABASE_URL) {
            window.ECOSENTINEL_CONFIG.USE_MOCK_DATA = true;
          }
          EOF
          echo "Generated config.js (length: $(wc -c < public/js/config.js) bytes)"

      # ----------------------------------------------------------------
      # 部署到 Azure Static Web Apps
      # ----------------------------------------------------------------
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # 我們的前端原始碼在 public/ 下
          app_location: "public"
          # 沒用到 Azure Functions
          api_location: ""
          # 因為是純靜態 HTML/JS,沒有 build 步驟,直接把 app_location 整個上傳
          output_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
